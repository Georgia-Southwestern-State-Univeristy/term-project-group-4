<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Packing Checklist Generator</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main id="app">
    <h1>Smart Packing Checklist Generator</h1>

    <section id="trip-form-section">
      <h2>Create a Trip</h2>
      <form id="trip-form">
        <label for="trip-name">Trip Name</label>
        <input type="text" id="trip-name" name="name" placeholder="e.g. Spring Break 2026" required />

        <label for="destination-type">Destination Type</label>
        <select id="destination-type" name="destinationType" required>
          <option value="">-- Select --</option>
          <option value="city">City</option>
          <option value="beach">Beach</option>
          <option value="outdoors">Outdoors / Camping</option>
        </select>

        <label for="duration">Duration (days)</label>
        <input type="number" id="duration" name="duration" min="1" max="30" required />

        <button type="submit">Generate Checklist</button>
        <button type="button" id="save-trip-btn" disabled>Save Trip</button>
      </form>
    </section>

    <section id="saved-trips-section">
      <h2>Saved Trips</h2>
      <input type="text" id="trip-search" placeholder="Filter by trip name…" />
      <p id="no-trips-message">No saved trips yet.</p>
      <ul id="saved-trips-list"></ul>
    </section>

    <section id="checklist-section" hidden>
      <h2>Your Packing Checklist</h2>
      <div id="checklist-container"></div>
      <p id="progress-text"></p>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
